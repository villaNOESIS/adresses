<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Noésis — Nos bonnes adresses</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brun:    #C9A84C;
    --brun-dk: #a8882e;
    --creme:   #FFFFFF;
    --or:      #C9A84C;
    --or-pale: #F5EDD0;
    --texte:   #1A1A1A;
    --gris:    #6B6B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--creme); color: var(--texte); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

  header { background: #FFFFFF; text-align: center; padding: 2rem 1.2rem 1.6rem; border-bottom: 1px solid #e8d9a0; }
  .header-logo { width: min(260px, 72vw); height: auto; display: block; margin: 0 auto 0.8rem; }
  header p { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--or); margin-top: 0; }

  nav { background: #2a2215; display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 0.5rem; position: sticky; top: 0; z-index: 10; }
  nav::-webkit-scrollbar { display: none; }
  nav a { flex: 0 0 auto; color: var(--or); opacity: 0.65; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.85rem 0.9rem; white-space: nowrap; transition: opacity .2s; border-bottom: 2px solid transparent; cursor: pointer; }
  nav a:hover, nav a.active { opacity: 1; border-bottom-color: var(--or); }

  main { padding: 0 0 3rem; }
  section { padding: 2rem 1rem 0.5rem; max-width: 640px; margin: 0 auto; }
  .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--or); }
  .section-icon { font-size: 1.3rem; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; letter-spacing: 0.05em; color: #1A1A1A; }
  .cards { display: flex; flex-direction: column; gap: 0.65rem; }

  .card { background: white; border-radius: 10px; padding: 0.9rem 1rem; display: flex; align-items: flex-start; gap: 0.8rem; border: 1px solid rgba(139,106,87,.12); transition: box-shadow .2s, transform .15s; text-decoration: none; color: inherit; }
  .card:active { transform: scale(0.985); }
  a.card:hover { box-shadow: 0 3px 14px rgba(201,168,76,.18); }
  .card.no-link { opacity: 0.6; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 0.92rem; font-weight: 500; color: var(--texte); line-height: 1.3; }
  .card-comment { font-size: 0.78rem; color: var(--gris); margin-top: 0.2rem; font-style: italic; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.35rem; align-items: center; }
  .card-arrow { color: var(--or); opacity: 0.6; font-size: 1rem; margin-top: 0.1rem; flex-shrink: 0; }

  .badge { font-size: 0.68rem; font-weight: 500; padding: 0.18rem 0.5rem; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-p1 { background: #EAF5EA; color: #2E7D32; }
  .badge-p2 { background: #FFF8E1; color: #F57F17; }
  .badge-p3 { background: #FFF3E0; color: #E65100; }
  .badge-p4 { background: #FCE4EC; color: #880E4F; }
  .badge-tag { background: var(--or-pale); color: #5a4a1a; }
  .badge-confirm { background: #F3F0EC; color: var(--gris); }

  /* Badges spéciaux par tag */
  .tag-michelin      { background: #FFF8E1; color: #c8a000; }
  .tag-coupdecoeur   { background: #FCE4EC; color: #c62828; }
  .tag-livraison     { background: #E3F2FD; color: #1565C0; }
  .tag-vue-mer       { background: #E0F7FA; color: #006064; }
  .tag-apied         { background: #E8F5E9; color: #2E7D32; }
  .tag-voiture       { background: #F3F0EC; color: var(--gris); }

  /* États */
  #loading, #error { text-align: center; padding: 3rem 1rem; color: var(--gris); font-size: 0.9rem; max-width: 640px; margin: 0 auto; }
  #error { color: #c0392b; }

  footer { text-align: center; padding: 2rem 1rem 1.5rem; font-size: 0.72rem; color: var(--gris); letter-spacing: 0.08em; text-transform: uppercase; border-top: 1px solid var(--or); max-width: 640px; margin: 0 auto; }
  footer a { color: var(--or); text-decoration: none; }
</style>
</head>

// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Gestion basique des champs entre guillemets
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function buildSite(rows) {

  const catOrder = [];
  const grouped = {};
  visible.forEach(r => {
    const cat = (r['Catégorie'] || '').toLowerCase().trim();
    if (!grouped[cat]) { grouped[cat] = []; catOrder.push(cat); }
    grouped[cat].push(r);
  });

  // Nav
  const nav = document.getElementById('mainnav');

    const info = CATEGORIES[cat] || { label: cat, emoji: '📍' };

  }).join('');

  const main = document.getElementById('main');
  main.innerHTML = catOrder.map(cat => {
    const info = CATEGORIES[cat] || { label: cat, emoji: '📍' };
    const cards = grouped[cat].map(r => buildCard(r)).join('');
    return `
      <section id="cat-${cat}">
        <div class="section-header">
          <span class="section-icon">${info.emoji}</span>
          <h2 class="section-title">${info.label}</h2>
        </div>
        <div class="cards">${cards}</div>
      </section>`;
  }).join('');

  // Active nav on scroll
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const active = document.querySelector(`nav a[href="#${entry.target.id}"]`);
        if (active) { active.classList.add('active'); active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  sections.forEach(s => observer.observe(s));
}

function buildCard(r) {
  const nom       = r['Nom'] || '';
  const lien      = r['Lien maps'] || '';
  const comment   = r['Commentaire personnel'] || '';
  const prixRaw   = parseInt(r['Prix'], 10);
  const tagsRaw   = r['Tags'] || '';

  // Tags : split sur ", " ou "," 
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  // Badges prix
  let prixBadge = '';
  if (prixRaw >= 1 && prixRaw <= 4) {
    const p = PRIX_CONFIG[prixRaw];
    prixBadge = `<span class="badge ${p.cls}">${p.label}</span>`;
  }

  // Badges tags
  const tagBadges = tags.map(t => {
    const cls   = TAG_CLASSES[t] || 'badge-tag';
    const label = TAG_LABELS[t]  || t;
    return `<span class="badge ${cls}">${label}</span>`;
  }).join('');

  const meta = (prixBadge || tagBadges) ? `<div class="card-meta">${prixBadge}${tagBadges}</div>` : '';
  const commentHtml = comment ? `<div class="card-comment">${comment}</div>` : '';

  if (lien) {
    return `<a class="card" href="${lien}" target="_blank" rel="noopener">
      <div class="card-body">
        <div class="card-name">${nom}</div>
        ${commentHtml}
        ${meta}
      </div>
      <span class="card-arrow">›</span>
    </a>`;
  } else {
    return `<div class="card no-link">
      <div class="card-body">
        <div class="card-name">${nom}</div>
        ${commentHtml}
        ${meta}
      </div>
    </div>`;
  }
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const bust = `&t=${Date.now()}`;
    const resp = await fetch(SHEET_CSV_URL + bust, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    buildSite(rows);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div id="error">Impossible de charger les données.<br><small>${e.message}</small></div>`;
  }
}

loadData();
</script>
